services:
  mongodb:
    image: mongo:7
    network_mode: host
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: auth-app
    network_mode: host
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://localhost:27017
      - REDIS_URL=redis://localhost:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
